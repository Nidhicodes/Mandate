[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Robinhood Chain testnet (Arbitrum Orbit L2). RPC + chain id set via env at deploy time.
[rpc_endpoints]
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"

[etherscan]
robinhood_testnet = { key = "", url = "https://explorer.testnet.chain.robinhood.com/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
